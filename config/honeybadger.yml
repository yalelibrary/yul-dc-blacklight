---
api_key:  <%= ENV.fetch('HONEYBADGER_API_KEY_BLACKLIGHT', '') %>
env:  <%= ENV.fetch('CLUSTER_NAME', 'local') %>
development_environments:
  - development
  - test
  - cucumber
  - local
request:
  # Identity / PII fields scrubbed from captured params before they reach Honeybadger
  filter_keys:
    - password
    - passw
    - secret
    - token
    - crypt
    - salt
    - certificate
    - otp
    - ssn
    - email
    - user_email
    - netid
    - user_netid
    - sub
    - user_sub
    - uid
    - user_full_name
    - user_note
    - idtoken
    - id_token
    - authorization